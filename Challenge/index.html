<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge</title>
</head>
<body>
    <script>
        let names = ["Ahmed Ali", "Sara Mohamed", "Omar Hassan", "Mona Ibrahim"];
let jobs = ["Developer", "Designer", "Teacher", "Engineer"];

let randomName = names[Math.floor(Math.random() * names.length)];
let randomJob = jobs[Math.floor(Math.random() * jobs.length)];

let age = Math.floor(Math.random() * 21) + 20;
let id = Math.floor(Math.random() * 10000);

document.getElementById("name").innerHTML = "Name: " + randomName;
document.getElementById("age").innerHTML = "Age: " + age;
document.getElementById("job").innerHTML = "Job: " + randomJob;
document.getElementById("id").innerHTML = "ID: " + id;
    </script>
</body>
</html>
