<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Function And Parameters</title>
</head>
<body>
    <script>
        //1
        function sayHello(theName, theGender) {

  if (theGender === "Male") {
    console.log(`Hello Mr ${theName}`);
  } 
  else if (theGender === "Female") {
    console.log(`Hello Miss ${theName}`);
  } 
  else {
    console.log(`Hello ${theName}`);
  }

}

//2
function calculate(firstNum, secondNum, operation) {

  if (secondNum === undefined) {
    console.log("Second Number Not Found");
    return;
  }

  if (operation === "add" || operation === undefined) {
    console.log(firstNum + secondNum);
  } 
  else if (operation === "subtract") {
    console.log(firstNum - secondNum);
  } 
  else if (operation === "multiply") {
    console.log(firstNum * secondNum);
  }

}

//3
function ageInTime(theAge) {

  if (theAge < 10 || theAge > 100) {
    console.log("Age Out Of Range");
    return;
  }

  console.log(`${theAge * 12} Months`);
  console.log(`${theAge * 52} Weeks`);
  console.log(`${theAge * 365} Days`);
  console.log(`${theAge * 8760} Hours`);
  console.log(`${theAge * 525600} Minutes`);
  console.log(`${theAge * 31536000} Seconds`);

}

//4
function checkStatus(a, b, c) {

  let name;
  let age;
  let status;

  if (typeof a === "string") name = a;
  else if (typeof a === "number") age = a;
  else status = a;

  if (typeof b === "string") name = b;
  else if (typeof b === "number") age = b;
  else status = b;

  if (typeof c === "string") name = c;
  else if (typeof c === "number") age = c;
  else status = c;

  if (status === true) {
    console.log(`Hello ${name}, Your Age Is ${age}, You Are Available For Hire`);
  } else {
    console.log(`Hello ${name}, Your Age Is ${age}, You Are Not Available For Hire`);
  }

}

//5
function createSelectBox(startYear, endYear) {

  document.write(`<select>`);

  for (let i = startYear; i <= endYear; i++) {
    document.write(`<option value="${i}">${i}</option>`);
  }

  document.write(`</select>`);

}

//7
function multiply(...numbers) {

  let result = 1;

  for (let i = 0; i < numbers.length; i++) {

    if (typeof numbers[i] === "string") continue;

    result *= Math.floor(numbers[i]);

  }

  console.log(result);

}

    </script>
</body>
</html>
