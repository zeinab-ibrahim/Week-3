<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function And Scopes</title>
</head>
<body>
    <script>
        //1
        function getDetails(zName, zAge, zCountry) {

  function namePattern(zName) {
    let name = zName.split(" ");
    return `${name[0]} ${name[1][0].toUpperCase()}.`;
  }

  function ageWithMessage(zAge) {
    let age = zAge.split(" ")[0];
    return `Your Age Is ${age}`;
  }

  function countryTwoLetters(zCountry) {
    return `You Live In ${zCountry.slice(0, 2).toUpperCase()}`;
  }

  function fullDetails() {
    return `Hello ${namePattern(zName)}, ${ageWithMessage(zAge)}, ${countryTwoLetters(zCountry)}`;
  }

  return fullDetails();
}

console.log(getDetails("Osama Mohamed", "38 Is My Age", "Egypt"));
// Hello Osama M., Your Age Is 38, You Live In EG

console.log(getDetails("Ahmed ali", "32 Is The Age", "Syria"));
// Hello Ahmed A., Your Age Is 32, You Live In SY

//2
let itsMe = () => `Iam A Normal Function`;

console.log(itsMe());


let urlCreate = (protocol, web, tld) => `${protocol}://www.${web}.${tld}`;

console.log(urlCreate("https", "elzero", "org"));

//3
let checker = zName => status => salary =>
  status === "Available"
    ? `${zName}, My Salary Is ${salary}`
    : `Iam Not Avaialble`;

console.log(checker("Osama")("Available")(4000));
console.log(checker("Ahmed")("Not Available")());

//4
function specialMix(...data) {

  let sum = 0;
  let hasNumber = false;

  for (let i = 0; i < data.length; i++) {

    let num = parseInt(data[i]);

    if (!isNaN(num)) {
      sum += num;
      hasNumber = true;
    }

  }

  return hasNumber ? sum : "All Is Strings";

}

console.log(specialMix(10, 20, 30)); 
console.log(specialMix("10Test", "Testing", "20Cool")); 
console.log(specialMix("Testing", "10Testing", "40Cool")); 
console.log(specialMix("Test", "Cool", "Test"));
    </script>
</body>
</html>
